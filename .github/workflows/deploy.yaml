name: terragrunt-azure-deploy

env:
  tf_version: 1.6.2
  tg_version: 0.52.1

concurrency:
  group: ${{ github.environment }}
  cancel-in-progress: true

on: 
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  #schedule:     
   # - cron: "0 4 * * *"   


permissions:
  id-token: write
  contents: read

jobs:
  Plan:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    name: Plan
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{env.tg_version}}/terragrunt_linux_amd64"
          sudo chmod +x /bin/terragrunt
          terragrunt -v

      - name: Terragrunt PLAN (OIDC → MG → Subs → RGs)
        working-directory: terragrunt/azure/live
        run: |
          terragrunt run-all plan --terragrunt-non-interactive  
          


  Apply:
    if: github.event_name == 'workflow_dispatch' && github.event_name != 'pull_request'
    name: Apply
    runs-on: ubuntu-22.04
    needs: [Plan]
    environment:
      name: mgmt

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terragrunt
        run: |
          sudo wget -q -O /bin/terragrunt "https://github.com/gruntwork-io/terragrunt/releases/download/v${{env.tg_version}}/terragrunt_linux_amd64"
          sudo chmod +x /bin/terragrunt
          terragrunt -v

      - name: Terragrunt APPLY (entire tree)
        working-directory: terragrunt/azure/live
        run: |
          terragrunt run-all apply --terragrunt-non-interactive --auto-approve


  









 